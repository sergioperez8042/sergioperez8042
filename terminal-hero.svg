<svg xmlns="http://www.w3.org/2000/svg" width="900" height="380" viewBox="0 0 900 380" fill="none" role="img" aria-label="Terminal · sergiorp@portfolio">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14151a"/>
      <stop offset="1" stop-color="#0a0a0d"/>
    </linearGradient>
    <linearGradient id="cromo" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c5cad4"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0L0 0 0 32" fill="none" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Window shadow -->
  <rect x="20" y="30" width="860" height="330" rx="14" fill="#000" opacity="0.45"/>

  <!-- Terminal window -->
  <rect x="16" y="20" width="868" height="340" rx="14" fill="url(#bg)" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
  <rect x="16" y="20" width="868" height="340" rx="14" fill="url(#grid)"/>

  <!-- Title bar -->
  <rect x="16" y="20" width="868" height="40" rx="14" fill="#1a1b22"/>
  <rect x="16" y="40" width="868" height="20" fill="#1a1b22"/>
  <line x1="16" y1="60" x2="884" y2="60" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- Window dots (monocromo, on-brand) -->
  <circle cx="40" cy="40" r="6" fill="#3a3b44"/>
  <circle cx="60" cy="40" r="6" fill="#3a3b44"/>
  <circle cx="80" cy="40" r="6" fill="#3a3b44"/>

  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="13" fill="#8a8a92" letter-spacing="0.5">sergiorp@portfolio: ~</text>

  <!-- Terminal body content -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14">

    <!-- Line 1: prompt + whoami -->
    <text x="40" y="100">
      <tspan fill="#86efac" font-weight="700">sergio</tspan><tspan fill="#8a8a92">@</tspan><tspan fill="url(#cromo)" font-weight="700">portfolio</tspan><tspan fill="#8a8a92"> :</tspan><tspan fill="#6b7eff" font-weight="600"> ~</tspan><tspan fill="#8a8a92"> $ </tspan><tspan fill="#f0f0f5">whoami</tspan>
    </text>
    <text x="40" y="124" fill="#c5cad4" font-weight="700">Sergio Rodríguez</text>
    <text x="40" y="146" fill="#8a8a92">Frontend Developer &amp; Project Manager — @ITConsulting Global</text>

    <!-- Spacer -->

    <!-- Line 2: prompt + cat about -->
    <text x="40" y="186">
      <tspan fill="#86efac" font-weight="700">sergio</tspan><tspan fill="#8a8a92">@</tspan><tspan fill="url(#cromo)" font-weight="700">portfolio</tspan><tspan fill="#8a8a92"> :</tspan><tspan fill="#6b7eff" font-weight="600"> ~</tspan><tspan fill="#8a8a92"> $ </tspan><tspan fill="#f0f0f5">cat about.txt</tspan>
    </text>
    <text x="40" y="210" fill="#c5cad4">Construyo producto que escala — del prototipo a producción.</text>
    <text x="40" y="232" fill="#8a8a92">5+ años · 30+ proyectos · ES · EAU · LATAM · Burgos.</text>

    <!-- Line 3: prompt + status -->
    <text x="40" y="272">
      <tspan fill="#86efac" font-weight="700">sergio</tspan><tspan fill="#8a8a92">@</tspan><tspan fill="url(#cromo)" font-weight="700">portfolio</tspan><tspan fill="#8a8a92"> :</tspan><tspan fill="#6b7eff" font-weight="600"> ~</tspan><tspan fill="#8a8a92"> $ </tspan><tspan fill="#f0f0f5">status --availability</tspan>
    </text>
    <text x="40" y="296">
      <tspan fill="#86efac">●</tspan><tspan fill="#c5cad4"> available</tspan><tspan fill="#8a8a92"> for selected projects starting Q2 2026</tspan>
    </text>

    <!-- Cursor blinking emulation (static, decorative) -->
    <text x="40" y="336">
      <tspan fill="#86efac" font-weight="700">sergio</tspan><tspan fill="#8a8a92">@</tspan><tspan fill="url(#cromo)" font-weight="700">portfolio</tspan><tspan fill="#8a8a92"> :</tspan><tspan fill="#6b7eff" font-weight="600"> ~</tspan><tspan fill="#8a8a92"> $ </tspan><tspan fill="#c5cad4">_</tspan>
    </text>
  </g>
</svg>
